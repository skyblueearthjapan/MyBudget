<script type="text/babel">
// voice — 音声入力モーダル (Web Speech API → Gemini AI 解析 → ローカル正規表現フォールバック)

function VoiceInputModal({ open, onClose, onAdd, accent, budget }) {
  const [listening, setListening] = React.useState(false);
  const [transcript, setTranscript] = React.useState('');
  const [analyzing, setAnalyzing] = React.useState(false);
  const [parsed, setParsed] = React.useState(null);
  const [kind, setKind] = React.useState('expenses'); // 'expenses' or 'incomes'
  const [matchedItem, setMatchedItem] = React.useState(null); // { id, name, amount } or null
  const [aiNotice, setAiNotice] = React.useState('');
  const [manualText, setManualText] = React.useState('');
  const recogRef = React.useRef(null);
  const supported = typeof window !== 'undefined' && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const hasGAS = typeof google !== 'undefined' && google.script && google.script.run;

  React.useEffect(() => {
    if (!open) {
      setListening(false); setTranscript(''); setParsed(null);
      setAnalyzing(false); setMatchedItem(null); setAiNotice('');
      setManualText('');
      if (recogRef.current) try { recogRef.current.stop(); } catch (e) {}
    }
  }, [open]);

  const submitManual = () => {
    const t = manualText.trim();
    if (!t) return;
    setTranscript(t);
    analyze(t);
  };

  const findItem = (k, id) => {
    if (!budget || !id) return null;
    const list = budget[k] || [];
    return list.find(r => r.id === id) || null;
  };

  const fallbackLocal = (text, note) => {
    const p = parseUtterance(text);
    setParsed(p);
    setMatchedItem(null);
    if (note) setAiNotice(note);
  };

  const analyze = (text) => {
    if (!text) return;
    setAnalyzing(true);
    setAiNotice('');
    setParsed(null);
    setMatchedItem(null);

    if (!hasGAS) {
      setAnalyzing(false);
      fallbackLocal(text, 'ローカル解析モード');
      return;
    }

    const expenses = (budget && budget.expenses) || [];
    const incomes  = (budget && budget.incomes)  || [];

    google.script.run
      .withSuccessHandler((res) => {
        setAnalyzing(false);
        if (!res || res.error) {
          const code = res && res.error;
          let msg = 'AI 解析失敗 — ローカル解析';
          if (code === 'API_KEY_MISSING')   msg = 'Gemini API キー未設定 — ローカル解析';
          else if (code === 'RATE_LIMIT')   msg = 'Gemini クォータ超過 — ローカル解析';
          else if (code === 'API_ERROR')    msg = `Gemini API エラー (${res.status || '?'}) — ローカル解析`;
          else if (code === 'FETCH_FAILED') msg = 'Gemini 通信失敗 — ローカル解析';
          fallbackLocal(text, msg);
          return;
        }
        const targetKind = res.kind === 'income' ? 'incomes' : 'expenses';
        setKind(targetKind);
        const matched = res.matchedItemId ? findItem(targetKind, res.matchedItemId) : null;
        setMatchedItem(matched);
        setParsed({
          name: matched ? matched.name : (res.name || '名称未設定'),
          amount: res.amount || 0,
          due: res.due || ''
        });
        setAiNotice(matched ? '✨ 既存項目に一致' : '✨ 新規項目');
      })
      .withFailureHandler(() => {
        setAnalyzing(false);
        fallbackLocal(text, 'AI 通信失敗 — ローカル解析');
      })
      .analyzeUtterance({ text, expenses, incomes });
  };

  const start = () => {
    setTranscript(''); setParsed(null); setMatchedItem(null); setAiNotice('');

    if (!supported) {
      setAiNotice('このブラウザは音声認識非対応です。下の「直接入力」をご利用ください');
      return;
    }

    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let r;
    try { r = new Rec(); }
    catch (e) {
      console.error('SpeechRecognition ctor failed', e);
      setAiNotice('音声認識を初期化できません。下の「直接入力」をご利用ください');
      return;
    }
    r.lang = 'ja-JP';
    r.interimResults = true;
    r.continuous = false;
    r.onstart = () => setListening(true);
    r.onresult = (e) => {
      let txt = '';
      for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
      setTranscript(txt);
      if (e.results[e.results.length - 1].isFinal) {
        setListening(false);
        analyze(txt);
      }
    };
    r.onerror = (e) => {
      console.error('SpeechRecognition error', e.error, e.message);
      setListening(false);
      const code = e.error || '';
      if (code === 'not-allowed' || code === 'service-not-allowed') {
        setAiNotice('マイク権限が拒否されました。ブラウザ設定で許可するか、下の「直接入力」をご利用ください');
      } else if (code === 'no-speech') {
        setAiNotice('音声が検出されませんでした');
      } else if (code === 'audio-capture') {
        setAiNotice('マイクが見つかりません');
      } else if (code === 'network') {
        setAiNotice('音声認識ネットワークエラー');
      } else if (code && code !== 'aborted') {
        setAiNotice('音声認識エラー: ' + code);
      }
    };
    r.onend = () => setListening(false);
    recogRef.current = r;
    try {
      r.start();
      setListening(true); // onstart 待ちが遅い端末向けの楽観更新
    } catch (e) {
      console.error('SpeechRecognition.start() failed', e);
      setAiNotice('音声認識を起動できません: ' + (e.message || e) + '。下の「直接入力」をご利用ください');
    }
  };

  const stop = () => {
    if (recogRef.current) try { recogRef.current.stop(); } catch (e) {}
    setListening(false);
    if (transcript) analyze(transcript);
  };

  const confirm = () => {
    if (!parsed) return;
    onAdd(kind, { name: parsed.name, amount: parsed.amount, due: parsed.due || '' }, matchedItem ? matchedItem.id : '');
    onClose();
  };

  if (!open) return null;

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
      background: 'rgba(0,0,0,0.35)',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', background: '#fafaf7',
        borderTopLeftRadius: 24, borderTopRightRadius: 24,
        padding: '14px 18px calc(28px + env(safe-area-inset-bottom))',
        boxSizing: 'border-box', maxHeight: '90%',
        overflowY: 'auto',
        animation: 'slideUp 240ms cubic-bezier(0.2, 0.8, 0.2, 1)',
      }}>
        <style>{`@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
          @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }
          @keyframes spin { to { transform: rotate(360deg); } }`}</style>

        <div style={{ width: 36, height: 4, borderRadius: 2, background: 'rgba(0,0,0,0.15)', margin: '0 auto 12px' }}></div>

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#1a1a1a' }}>音声で追加 🍀</div>
          <button onClick={onClose} style={{ all: 'unset', cursor: 'pointer', color: '#888', fontSize: 14 }}>閉じる</button>
        </div>
        <div style={{ fontSize: 11.5, color: '#888', marginBottom: 14 }}>
          AI が支出/収入と既存項目の一致を判定します。例：「楽天カードに 12000円」「コンビニ 580円」
        </div>

        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0,
          background: '#f1efe9', borderRadius: 10, padding: 3, marginBottom: 14,
        }}>
          {[{id: 'expenses', label: '💸 支出'}, {id: 'incomes', label: '💰 収入'}].map(o => {
            const active = o.id === kind;
            return (
              <button key={o.id} onClick={() => { setKind(o.id); setMatchedItem(null); }} style={{
                all: 'unset', cursor: 'pointer', textAlign: 'center',
                padding: '8px 0', fontSize: 13, fontWeight: 600,
                color: active ? '#1a1a1a' : '#888',
                background: active ? '#fff' : 'transparent', borderRadius: 8,
                boxShadow: active ? '0 1px 2px rgba(0,0,0,0.05)' : 'none',
              }}>{o.label}</button>
            );
          })}
        </div>

        <div style={{
          minHeight: 72, padding: '14px 16px',
          background: '#fff', borderRadius: 12, border: '0.5px solid rgba(0,0,0,0.06)',
          fontSize: 16, color: transcript ? '#1a1a1a' : '#bbb', marginBottom: 12,
        }}>
          {transcript || (listening ? '聞いています…' : 'マイクをタップして話してください')}
        </div>

        {analyzing && (
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '12px 16px', marginBottom: 12,
            background: '#fff', borderRadius: 12, border: '0.5px solid rgba(0,0,0,0.06)',
            fontSize: 13, color: '#666',
          }}>
            <div style={{
              width: 14, height: 14, borderRadius: '50%',
              border: '2px solid rgba(0,0,0,0.1)', borderTopColor: accent,
              animation: 'spin 0.8s linear infinite',
            }}></div>
            AI で分析中…
          </div>
        )}

        {parsed && !analyzing && (
          <div style={{
            background: '#fff', borderRadius: 12, padding: '12px 16px',
            border: matchedItem ? `1.5px solid ${accent}` : `1px solid ${accent}55`,
            marginBottom: 12,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ fontSize: 18 }}>{kind === 'incomes' ? '💰' : '💸'}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 500, color: '#1a1a1a',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{parsed.name}</div>
                {parsed.due && <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>支払日 {parsed.due}</div>}
              </div>
              <div style={{ fontSize: 17, fontWeight: 500, color: '#1a1a1a', fontVariantNumeric: 'tabular-nums' }}>
                {formatYen(parsed.amount)}
              </div>
            </div>
            {matchedItem && (
              <div style={{
                marginTop: 8, paddingTop: 8, borderTop: '0.5px solid rgba(0,0,0,0.06)',
                fontSize: 11.5, color: '#888',
              }}>
                既存「{matchedItem.name}」({formatYen(matchedItem.amount)}) → {formatYen(parsed.amount)} に上書き
              </div>
            )}
            {aiNotice && (
              <div style={{ marginTop: matchedItem ? 4 : 8, fontSize: 10.5, color: '#aaa' }}>
                {aiNotice}
              </div>
            )}
          </div>
        )}

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '6px 0 4px' }}>
          <button onClick={listening ? stop : start} disabled={analyzing} style={{
            all: 'unset', cursor: analyzing ? 'default' : 'pointer',
            width: 68, height: 68, borderRadius: 999,
            background: listening ? '#c0392b' : (analyzing ? '#888' : '#1a1a1a'),
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: listening ? `0 0 0 8px ${accent}33` : '0 6px 18px rgba(0,0,0,0.18)',
            animation: listening ? 'pulse 1.2s ease-in-out infinite' : 'none',
            transition: 'background 200ms ease',
            opacity: analyzing ? 0.6 : 1,
          }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <rect x="9" y="3" width="6" height="12" rx="3" fill="#fff"/>
              <path d="M5 11a7 7 0 0014 0M12 18v3" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" fill="none"/>
            </svg>
          </button>
        </div>
        <div style={{ textAlign: 'center', marginTop: 8, fontSize: 11, color: '#999' }}>
          {listening ? 'タップで停止' : (supported ? 'タップして話す' : '音声認識非対応 — 直接入力をご利用ください')}
        </div>

        <div style={{
          marginTop: 14, paddingTop: 12,
          borderTop: '0.5px solid rgba(0,0,0,0.06)',
        }}>
          <div style={{ fontSize: 10.5, color: '#999', marginBottom: 6, letterSpacing: 0.4 }}>
            または直接入力
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              type="text"
              value={manualText}
              onChange={e => setManualText(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') submitManual(); }}
              placeholder="例: 楽天カードに 12000円"
              disabled={analyzing || listening}
              style={{
                flex: 1, boxSizing: 'border-box',
                padding: '10px 12px', fontSize: 14,
                border: '1px solid rgba(0,0,0,0.1)', borderRadius: 10,
                background: '#fff', color: '#1a1a1a', outline: 'none',
                fontFamily: 'inherit',
              }}
            />
            <button onClick={submitManual} disabled={analyzing || listening || !manualText.trim()} style={{
              all: 'unset', cursor: (analyzing || listening || !manualText.trim()) ? 'default' : 'pointer',
              padding: '10px 14px', fontSize: 13, fontWeight: 600,
              color: '#fff', background: accent, borderRadius: 10,
              opacity: (analyzing || listening || !manualText.trim()) ? 0.4 : 1,
            }}>解析</button>
          </div>
        </div>

        {parsed && !analyzing && (
          <button onClick={confirm} style={{
            all: 'unset', cursor: 'pointer', display: 'block', boxSizing: 'border-box',
            width: '100%', textAlign: 'center', marginTop: 14,
            padding: '13px 0', fontSize: 14.5, fontWeight: 600,
            color: '#fff', background: '#1a1a1a', borderRadius: 12,
          }}>
            {matchedItem
              ? `「${matchedItem.name}」を ${formatYen(parsed.amount)} に上書き`
              : (kind === 'incomes' ? '収入に追加' : '支出に追加')}
          </button>
        )}
      </div>
    </div>
  );
}

function parseUtterance(text) {
  if (!text) return null;
  let s = text.trim();

  let due = '';
  const dueRe1 = /(\d{1,2})月(\d{1,2})日/;
  const dueRe2 = /(\d{1,2})\/(\d{1,2})/;
  let m = s.match(dueRe1) || s.match(dueRe2);
  if (m) { due = `${parseInt(m[1])}/${parseInt(m[2])}`; s = s.replace(m[0], '').trim(); }

  let amount = 0;
  const manRe = /([\d,\.]+)\s*万(\d+)?/;
  const yenRe = /([\d,]+)\s*円?/;
  const manM = s.match(manRe);
  if (manM) {
    const base = parseFloat(manM[1].replace(/,/g, '')) * 10000;
    const tail = manM[2] ? parseInt(manM[2]) : 0;
    amount = Math.round(base + tail);
    s = s.replace(manM[0], '').trim();
  } else {
    const yM = s.match(yenRe);
    if (yM) {
      amount = parseInt(yM[1].replace(/,/g, ''), 10) || 0;
      s = s.replace(yM[0], '').trim();
    }
  }

  const name = s.replace(/[、,。\s]+/g, ' ').trim() || '名称未設定';
  return { name, amount, due };
}

Object.assign(window, { VoiceInputModal });
</script>
