<script type="text/babel">
// voice — 音声入力モーダル (Web Speech API + フォールバック)

function VoiceInputModal({ open, onClose, onAdd, accent }) {
  const [listening, setListening] = React.useState(false);
  const [transcript, setTranscript] = React.useState('');
  const [parsed, setParsed] = React.useState(null);
  const [kind, setKind] = React.useState('expenses');
  const recogRef = React.useRef(null);
  const supported = typeof window !== 'undefined' && (window.SpeechRecognition || window.webkitSpeechRecognition);

  React.useEffect(() => {
    if (!open) {
      setListening(false); setTranscript(''); setParsed(null);
      if (recogRef.current) try { recogRef.current.stop(); } catch (e) {}
    }
  }, [open]);

  const start = () => {
    setTranscript(''); setParsed(null);
    if (!supported) {
      setListening(true);
      const samples = [
        '楽天カード 12000円',
        'コンビニ 580円',
        '給料 50万円',
        'ガソリン代 4500円',
      ];
      const pick = samples[Math.floor(Math.random() * samples.length)];
      let i = 0;
      const tick = setInterval(() => {
        i++;
        setTranscript(pick.slice(0, Math.ceil(pick.length * (i / 8))));
        if (i >= 8) {
          clearInterval(tick);
          setListening(false);
          setTranscript(pick);
          setParsed(parseUtterance(pick));
        }
      }, 180);
      return;
    }
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new Rec();
    r.lang = 'ja-JP';
    r.interimResults = true;
    r.continuous = false;
    r.onresult = (e) => {
      let txt = '';
      for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
      setTranscript(txt);
      if (e.results[e.results.length - 1].isFinal) {
        setParsed(parseUtterance(txt));
        setListening(false);
      }
    };
    r.onerror = () => setListening(false);
    r.onend = () => setListening(false);
    recogRef.current = r;
    r.start();
    setListening(true);
  };

  const stop = () => {
    if (recogRef.current) try { recogRef.current.stop(); } catch (e) {}
    setListening(false);
    if (transcript) setParsed(parseUtterance(transcript));
  };

  const confirm = () => {
    if (!parsed) return;
    onAdd(kind, { name: parsed.name, amount: parsed.amount, due: parsed.due || '' });
    onClose();
  };

  if (!open) return null;

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
      background: 'rgba(0,0,0,0.35)',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', background: '#fafaf7',
        borderTopLeftRadius: 24, borderTopRightRadius: 24,
        padding: '14px 18px calc(28px + env(safe-area-inset-bottom))',
        boxSizing: 'border-box',
        animation: 'slideUp 240ms cubic-bezier(0.2, 0.8, 0.2, 1)',
      }}>
        <style>{`@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
          @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }`}</style>

        <div style={{ width: 36, height: 4, borderRadius: 2, background: 'rgba(0,0,0,0.15)', margin: '0 auto 12px' }}></div>

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#1a1a1a' }}>音声で追加 🍀</div>
          <button onClick={onClose} style={{ all: 'unset', cursor: 'pointer', color: '#888', fontSize: 14 }}>閉じる</button>
        </div>
        <div style={{ fontSize: 11.5, color: '#888', marginBottom: 14 }}>
          例：「楽天カード 12000円」「コンビニ 580円 4月15日」
        </div>

        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0,
          background: '#f1efe9', borderRadius: 10, padding: 3, marginBottom: 14,
        }}>
          {[{id: 'expenses', label: '💸 支出'}, {id: 'incomes', label: '💰 収入'}].map(o => {
            const active = o.id === kind;
            return (
              <button key={o.id} onClick={() => setKind(o.id)} style={{
                all: 'unset', cursor: 'pointer', textAlign: 'center',
                padding: '8px 0', fontSize: 13, fontWeight: 600,
                color: active ? '#1a1a1a' : '#888',
                background: active ? '#fff' : 'transparent', borderRadius: 8,
                boxShadow: active ? '0 1px 2px rgba(0,0,0,0.05)' : 'none',
              }}>{o.label}</button>
            );
          })}
        </div>

        <div style={{
          minHeight: 72, padding: '14px 16px',
          background: '#fff', borderRadius: 12, border: '0.5px solid rgba(0,0,0,0.06)',
          fontSize: 16, color: transcript ? '#1a1a1a' : '#bbb', marginBottom: 12,
        }}>
          {transcript || (listening ? '聞いています…' : 'マイクをタップして話してください')}
        </div>

        {parsed && (
          <div style={{
            background: '#fff', borderRadius: 12, padding: '12px 16px',
            border: `1px solid ${accent}55`, marginBottom: 12,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <div style={{ fontSize: 18 }}>{kind === 'incomes' ? '💰' : '💸'}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 500, color: '#1a1a1a' }}>{parsed.name}</div>
              {parsed.due && <div style={{ fontSize: 11, color: '#888', marginTop: 2 }}>支払日 {parsed.due}</div>}
            </div>
            <div style={{ fontSize: 17, fontWeight: 500, color: '#1a1a1a', fontVariantNumeric: 'tabular-nums' }}>
              {formatYen(parsed.amount)}
            </div>
          </div>
        )}

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '6px 0 4px' }}>
          <button onClick={listening ? stop : start} style={{
            all: 'unset', cursor: 'pointer',
            width: 68, height: 68, borderRadius: 999,
            background: listening ? '#c0392b' : '#1a1a1a',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: listening ? `0 0 0 8px ${accent}33` : '0 6px 18px rgba(0,0,0,0.18)',
            animation: listening ? 'pulse 1.2s ease-in-out infinite' : 'none',
            transition: 'background 200ms ease',
          }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <rect x="9" y="3" width="6" height="12" rx="3" fill="#fff"/>
              <path d="M5 11a7 7 0 0014 0M12 18v3" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" fill="none"/>
            </svg>
          </button>
        </div>
        <div style={{ textAlign: 'center', marginTop: 8, fontSize: 11, color: '#999' }}>
          {listening ? 'タップで停止' : (supported ? 'タップして話す' : 'デモ：タップでサンプル入力')}
        </div>

        {parsed && (
          <button onClick={confirm} style={{
            all: 'unset', cursor: 'pointer', display: 'block', boxSizing: 'border-box',
            width: '100%', textAlign: 'center', marginTop: 14,
            padding: '13px 0', fontSize: 14.5, fontWeight: 600,
            color: '#fff', background: '#1a1a1a', borderRadius: 12,
          }}>
            {kind === 'incomes' ? '収入' : '支出'}に追加する
          </button>
        )}
      </div>
    </div>
  );
}

function parseUtterance(text) {
  if (!text) return null;
  let s = text.trim();

  let due = '';
  const dueRe1 = /(\d{1,2})月(\d{1,2})日/;
  const dueRe2 = /(\d{1,2})\/(\d{1,2})/;
  let m = s.match(dueRe1) || s.match(dueRe2);
  if (m) { due = `${parseInt(m[1])}/${parseInt(m[2])}`; s = s.replace(m[0], '').trim(); }

  let amount = 0;
  const manRe = /([\d,\.]+)\s*万(\d+)?/;
  const yenRe = /([\d,]+)\s*円?/;
  const manM = s.match(manRe);
  if (manM) {
    const base = parseFloat(manM[1].replace(/,/g, '')) * 10000;
    const tail = manM[2] ? parseInt(manM[2]) : 0;
    amount = Math.round(base + tail);
    s = s.replace(manM[0], '').trim();
  } else {
    const yM = s.match(yenRe);
    if (yM) {
      amount = parseInt(yM[1].replace(/,/g, ''), 10) || 0;
      s = s.replace(yM[0], '').trim();
    }
  }

  const name = s.replace(/[、,。\s]+/g, ' ').trim() || '名称未設定';
  return { name, amount, due };
}

Object.assign(window, { VoiceInputModal });
</script>
