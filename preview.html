<script>
  // データ永続化ブリッジ — GAS の PropertiesService に JSON を保存。
  // 失敗時は localStorage にフォールバック。
  window.MyBudgetStorage = (function () {
    const LS_KEY = 'mybudget_v1';
    const hasGAS = typeof google !== 'undefined' && google.script && google.script.run;

    function load() {
      return new Promise((resolve) => {
        if (!hasGAS) {
          try {
            const raw = localStorage.getItem(LS_KEY);
            return resolve(raw ? JSON.parse(raw) : null);
          } catch (e) { return resolve(null); }
        }
        google.script.run
          .withSuccessHandler((s) => {
            if (!s) {
              try {
                const raw = localStorage.getItem(LS_KEY);
                return resolve(raw ? JSON.parse(raw) : null);
              } catch (e) { return resolve(null); }
            }
            try { resolve(JSON.parse(s)); } catch (e) { resolve(null); }
          })
          .withFailureHandler(() => {
            try {
              const raw = localStorage.getItem(LS_KEY);
              resolve(raw ? JSON.parse(raw) : null);
            } catch (e) { resolve(null); }
          })
          .getBudgets();
      });
    }

    function save(data) {
      const json = JSON.stringify(data);
      try { localStorage.setItem(LS_KEY, json); } catch (e) {}
      if (!hasGAS) return Promise.resolve(true);
      return new Promise((resolve) => {
        google.script.run
          .withSuccessHandler(() => resolve(true))
          .withFailureHandler(() => resolve(false))
          .saveBudgets(json);
      });
    }

    return { load, save };
  })();
</script>

<script type="text/babel">
// voice — 音声入力モーダル
// マイク権限は GAS の iframe 内では取れないので、別ウィンドウ (window.open)
// で SpeechRecognition を回し、結果は postMessage で親に戻す方式。
// 既知パターン (cf. AI-Calendar)。

const VOICE_MSG_TYPE = 'mybudget_voice_result';

const VOICE_POPUP_HTML =
'<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">' +
'<meta name="viewport" content="width=device-width, initial-scale=1">' +
'<title>音声入力</title><style>' +
'*{box-sizing:border-box;margin:0;padding:0}' +
'body{font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;background:#fafaf7;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}' +
'h2{color:#1a1a1a;margin-bottom:14px;font-size:16px;font-weight:600}' +
'.mic-btn{width:80px;height:80px;border-radius:50%;border:none;background:#1a1a1a;color:#fff;font-size:32px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.18);transition:all .2s}' +
'.mic-btn:hover{transform:scale(1.05)}' +
'.mic-btn.recording{background:#c0392b;animation:pulse 1s infinite}' +
'@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}' +
'.status{margin-top:12px;font-size:13px;color:#666;text-align:center;min-height:18px}' +
'.error{color:#c0392b;margin-top:6px;font-size:12px;text-align:center;min-height:16px}' +
'.area{width:100%;max-width:380px;margin-top:14px}' +
'textarea{width:100%;min-height:100px;border:1px solid rgba(0,0,0,0.15);border-radius:12px;padding:12px;font-size:15px;font-family:inherit;resize:vertical;outline:none}' +
'textarea:focus{border-color:#1a1a1a}' +
'.row{display:flex;gap:8px;margin-top:12px;width:100%;max-width:380px}' +
'.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14.5px;font-weight:600;cursor:pointer}' +
'.send{background:#1a1a1a;color:#fff}' +
'.cancel{background:#f1f0ec;color:#333}' +
'</style></head><body>' +
'<h2>音声入力 🍀</h2>' +
'<button class="mic-btn" id="m">🎤</button>' +
'<div class="status" id="s">タップして話してください</div>' +
'<div class="error" id="e"></div>' +
'<div class="area"><textarea id="t" placeholder="例: 楽天カードに 12000円"></textarea></div>' +
'<div class="row"><button class="btn cancel" id="c">キャンセル</button><button class="btn send" id="g">解析する</button></div>' +
'<script>' +
'var m=document.getElementById("m"),s=document.getElementById("s"),e=document.getElementById("e"),t=document.getElementById("t"),g=document.getElementById("g"),c=document.getElementById("c");' +
'var rec=null,rec_on=false,buf="";' +
'var SR=window.SpeechRecognition||window.webkitSpeechRecognition;' +
'if(!SR){s.textContent="";e.textContent="このブラウザは音声認識非対応。テキストを直接入力できます。";m.disabled=true;}' +
'm.addEventListener("click",function(){rec_on?stopR():startR();});' +
'g.addEventListener("click",function(){var v=t.value.trim();if(!v){e.textContent="テキストが空です";return;}if(window.opener)window.opener.postMessage({type:"' + VOICE_MSG_TYPE + '",text:v},"*");window.close();});' +
'c.addEventListener("click",function(){if(rec)try{rec.abort();}catch(_){};window.close();});' +
'function startR(){e.textContent="";buf="";t.value="";rec=new SR();rec.lang="ja-JP";rec.continuous=true;rec.interimResults=true;' +
'rec.onstart=function(){rec_on=true;m.classList.add("recording");m.textContent="⏹";s.textContent="🎤 録音中…タップで停止";};' +
'rec.onresult=function(ev){var ip="",fn="";for(var i=ev.resultIndex;i<ev.results.length;i++){var x=ev.results[i][0].transcript;if(ev.results[i].isFinal)fn+=x;else ip+=x;}if(fn)buf+=fn;t.value=buf+ip;};' +
'rec.onerror=function(ev){console.error("Speech error:",ev.error);if(ev.error==="not-allowed")e.textContent="マイクの使用が許可されていません。アドレスバー左の鍵アイコンから許可してください。";else if(ev.error==="no-speech")e.textContent="音声が検出されませんでした";else if(ev.error!=="aborted")e.textContent="音声認識エラー: "+ev.error;stopR();};' +
'rec.onend=function(){if(rec_on)stopR();};' +
'try{rec.start();}catch(ex){e.textContent="音声入力の開始に失敗: "+ex.message;stopR();}}' +
'function stopR(){rec_on=false;m.classList.remove("recording");m.textContent="🎤";if(rec){try{rec.stop();}catch(_){};rec=null;}if(t.value.trim())s.textContent="編集して「解析する」を押してください";else s.textContent="タップして話してください";}' +
'if(SR)setTimeout(function(){startR();},400);' +
'<\/script></body></html>';

function VoiceInputModal({ open, onClose, onAdd, accent, budget }) {
  const [transcript, setTranscript] = React.useState('');
  const [analyzing, setAnalyzing] = React.useState(false);
  const [parsed, setParsed] = React.useState(null);
  const [kind, setKind] = React.useState('expenses');
  const [matchedItem, setMatchedItem] = React.useState(null);
  const [aiNotice, setAiNotice] = React.useState('');
  const [manualText, setManualText] = React.useState('');
  const popupRef = React.useRef(null);
  const hasGAS = typeof google !== 'undefined' && google.script && google.script.run;

  React.useEffect(() => {
    if (!open) {
      setTranscript(''); setParsed(null); setAnalyzing(false);
      setMatchedItem(null); setAiNotice(''); setManualText('');
      if (popupRef.current && !popupRef.current.closed) {
        try { popupRef.current.close(); } catch (e) {}
      }
      popupRef.current = null;
    }
  }, [open]);

  React.useEffect(() => {
    if (!open) return;
    const handler = (event) => {
      if (!event.data || event.data.type !== VOICE_MSG_TYPE) return;
      const text = (event.data.text || '').trim();
      if (!text) return;
      setTranscript(text);
      analyze(text);
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
    // eslint-disable-next-line
  }, [open, budget]);

  const findItem = (k, id) => {
    if (!budget || !id) return null;
    return (budget[k] || []).find(r => r.id === id) || null;
  };

  const fallbackLocal = (text, note) => {
    const p = parseUtterance(text);
    setParsed(p);
    setMatchedItem(null);
    if (note) setAiNotice(note);
  };

  const analyze = (text) => {
    if (!text) return;
    setAnalyzing(true);
    setAiNotice('');
    setParsed(null);
    setMatchedItem(null);

    if (!hasGAS) {
      setAnalyzing(false);
      fallbackLocal(text, 'ローカル解析モード');
      return;
    }

    const expenses = (budget && budget.expenses) || [];
    const incomes  = (budget && budget.incomes)  || [];

    google.script.run
      .withSuccessHandler((res) => {
        setAnalyzing(false);
        if (!res || res.error) {
          const code = res && res.error;
          let msg = 'AI 解析失敗 — ローカル解析';
          if (code === 'API_KEY_MISSING')   msg = 'Gemini API キー未設定 — ローカル解析';
          else if (code === 'RATE_LIMIT')   msg = 'Gemini クォータ超過 — ローカル解析';
          else if (code === 'API_ERROR')    msg = `Gemini API エラー (${res.status || '?'}) — ローカル解析`;
          else if (code === 'FETCH_FAILED') msg = 'Gemini 通信失敗 — ローカル解析';
          fallbackLocal(text, msg);
          return;
        }
        const targetKind = res.kind === 'income' ? 'incomes' : 'expenses';
        setKind(targetKind);
        const matched = res.matchedItemId ? findItem(targetKind, res.matchedItemId) : null;
        setMatchedItem(matched);
        setParsed({
          name: matched ? matched.name : (res.name || '名称未設定'),
          amount: res.amount || 0,
          due: res.due || ''
        });
        setAiNotice(matched ? '✨ 既存項目に一致' : '✨ 新規項目');
      })
      .withFailureHandler(() => {
        setAnalyzing(false);
        fallbackLocal(text, 'AI 通信失敗 — ローカル解析');
      })
      .analyzeUtterance({ text, expenses, incomes });
  };

  const openPopup = () => {
    setTranscript(''); setParsed(null); setMatchedItem(null); setAiNotice('');
    if (popupRef.current && !popupRef.current.closed) {
      try { popupRef.current.focus(); } catch (e) {}
      return;
    }
    let popup;
    try {
      popup = window.open('', 'mybudget_voice_input', 'width=420,height=560,scrollbars=no,resizable=yes');
    } catch (e) {
      setAiNotice('音声ウィンドウを開けません — 直接入力をご利用ください');
      return;
    }
    if (!popup) {
      setAiNotice('ポップアップがブロックされました — 直接入力をご利用ください');
      return;
    }
    popup.document.open();
    popup.document.write(VOICE_POPUP_HTML);
    popup.document.close();
    popupRef.current = popup;
  };

  const submitManual = () => {
    const t = manualText.trim();
    if (!t) return;
    setTranscript(t);
    analyze(t);
  };

  const confirm = () => {
    if (!parsed) return;
    onAdd(kind, { name: parsed.name, amount: parsed.amount, due: parsed.due || '' }, matchedItem ? matchedItem.id : '');
    onClose();
  };

  if (!open) return null;

  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
      background: 'rgba(0,0,0,0.35)',
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', background: '#fafaf7',
        borderTopLeftRadius: 24, borderTopRightRadius: 24,
        padding: '14px 18px calc(28px + env(safe-area-inset-bottom))',
        boxSizing: 'border-box', maxHeight: '90%',
        overflowY: 'auto',
        animation: 'slideUp 240ms cubic-bezier(0.2, 0.8, 0.2, 1)',
      }}>
        <style>{`@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
          @keyframes spin { to { transform: rotate(360deg); } }`}</style>

        <div style={{ width: 36, height: 4, borderRadius: 2, background: 'rgba(0,0,0,0.15)', margin: '0 auto 12px' }}></div>

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: '#1a1a1a' }}>音声で追加 🍀</div>
          <button onClick={onClose} style={{ all: 'unset', cursor: 'pointer', color: '#888', fontSize: 14 }}>閉じる</button>
        </div>
        <div style={{ fontSize: 11.5, color: '#888', marginBottom: 14 }}>
          AI が支出/収入と既存項目の一致を判定します。例：「楽天カードに 12000円」「コンビニ 580円」
        </div>

        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0,
          background: '#f1efe9', borderRadius: 10, padding: 3, marginBottom: 14,
        }}>
          {[{id: 'expenses', label: '💸 支出'}, {id: 'incomes', label: '💰 収入'}].map(o => {
            const active = o.id === kind;
            return (
              <button key={o.id} onClick={() => { setKind(o.id); setMatchedItem(null); }} style={{
                all: 'unset', cursor: 'pointer', textAlign: 'center',
                padding: '8px 0', fontSize: 13, fontWeight: 600,
                color: active ? '#1a1a1a' : '#888',
                background: active ? '#fff' : 'transparent', borderRadius: 8,
                boxShadow: active ? '0 1px 2px rgba(0,0,0,0.05)' : 'none',
              }}>{o.label}</button>
            );
          })}
        </div>

        <button onClick={openPopup} disabled={analyzing} style={{
          all: 'unset', cursor: analyzing ? 'default' : 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
          width: '100%', boxSizing: 'border-box',
          padding: '14px 16px', fontSize: 15, fontWeight: 600,
          color: '#fff', background: '#1a1a1a', borderRadius: 12,
          boxShadow: '0 4px 12px rgba(0,0,0,0.12)',
          opacity: analyzing ? 0.5 : 1,
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="3" width="6" height="12" rx="3" fill="#fff"/>
            <path d="M5 11a7 7 0 0014 0M12 18v3" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" fill="none"/>
          </svg>
          音声入力（別ウィンドウで開く）
        </button>
        <div style={{ fontSize: 10.5, color: '#aaa', marginTop: 6, textAlign: 'center' }}>
          別ウィンドウでマイク権限を許可してください
        </div>

        {transcript && (
          <div style={{
            marginTop: 14, padding: '10px 14px',
            background: '#fff', borderRadius: 10, border: '0.5px solid rgba(0,0,0,0.06)',
            fontSize: 13.5, color: '#333',
          }}>
            「{transcript}」
          </div>
        )}

        {analyzing && (
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: '12px 16px', marginTop: 12,
            background: '#fff', borderRadius: 12, border: '0.5px solid rgba(0,0,0,0.06)',
            fontSize: 13, color: '#666',
          }}>
            <div style={{
              width: 14, height: 14, borderRadius: '50%',
              border: '2px solid rgba(0,0,0,0.1)', borderTopColor: accent,
              animation: 'spin 0.8s linear infinite',
            }}></div>
            AI で分析中…
          </div>
        )}

        {parsed && !analyzing && (
          <div style={{
            background: '#fff', borderRadius: 12, padding: '12px 16px',
            border: matchedItem ? `1.5px solid ${accent}` : `1px solid ${accent}55`,
            marginTop: 12,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ fontSize: 18 }}>{kind === 'incomes' ? '💰' : '💸'}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 500, color: '#1a1a1a',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{parsed.name}</div>

              </div>
            )}
            {aiNotice && (
              <div style={{ marginTop: matchedItem ? 4 : 8, fontSize: 10.5, color: '#aaa' }}>
                {aiNotice}
              </div>
            )}
          </div>
        )}

        {parsed && !analyzing && (
          <button onClick={confirm} style={{
            all: 'unset', cursor: 'pointer', display: 'block', boxSizing: 'border-box',
            width: '100%', textAlign: 'center', marginTop: 14,
            padding: '13px 0', fontSize: 14.5, fontWeight: 600,
            color: '#fff', background: accent, borderRadius: 12,
          }}>
            {matchedItem
              ? `「${matchedItem.name}」を ${formatYen(parsed.amount)} に上書き`
              : (kind === 'incomes' ? '収入に追加' : '支出に追加')}
          </button>
        )}

        <div style={{
          marginTop: 18, paddingTop: 12,
          borderTop: '0.5px solid rgba(0,0,0,0.06)',
        }}>
          <div style={{ fontSize: 10.5, color: '#999', marginBottom: 6, letterSpacing: 0.4 }}>
            または直接入力
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input
              type="text"
              value={manualText}
              onChange={e => setManualText(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') submitManual(); }}
              placeholder="例: 楽天カードに 12000円"
              disabled={analyzing}
              style={{
                flex: 1, boxSizing: 'border-box',
                padding: '10px 12px', fontSize: 14,
                border: '1px solid rgba(0,0,0,0.1)', borderRadius: 10,
                background: '#fff', color: '#1a1a1a', outline: 'none',
                fontFamily: 'inherit',
              }}
            />
            <button onClick={submitManual} disabled={analyzing || !manualText.trim()} style={{
              all: 'unset', cursor: (analyzing || !manualText.trim()) ? 'default' : 'pointer',
              padding: '10px 14px', fontSize: 13, fontWeight: 600,
              color: '#fff', background: accent, borderRadius: 10,
              opacity: (analyzing || !manualText.trim()) ? 0.4 : 1,
            }}>解析</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function parseUtterance(text) {
  if (!text) return null;
  let s = text.trim();

  let due = '';
  const dueRe1 = /(\d{1,2})月(\d{1,2})日/;
  const dueRe2 = /(\d{1,2})\/(\d{1,2})/;
  let m = s.match(dueRe1) || s.match(dueRe2);
  if (m) { due = `${parseInt(m[1])}/${parseInt(m[2])}`; s = s.replace(m[0], '').trim(); }

  let amount = 0;
  const manRe = /([\d,\.]+)\s*万(\d+)?/;
  const yenRe = /([\d,]+)\s*円?/;
  const manM = s.match(manRe);
  if (manM) {
    const base = parseFloat(manM[1].replace(/,/g, '')) * 10000;
    const tail = manM[2] ? parseInt(manM[2]) : 0;
    amount = Math.round(base + tail);
    s = s.replace(manM[0], '').trim();
  } else {
    const yM = s.match(yenRe);
    if (yM) {
      amount = parseInt(yM[1].replace(/,/g, ''), 10) || 0;
      s = s.replace(yM[0], '').trim();
    }
  }

  const name = s.replace(/[、,。\s]+/g, ' ').trim() || '名称未設定';
  return { name, amount, due };
}

function BudgetScreen({ budget, onUpdate, accent, showDueDate, compact }) {
  const expTotal = sumAmounts(budget.expenses);

  const isDeficit = balance < 0;

  const updateRow = (kind, row) => {
    const list = budget[kind].map(r => r.id === row.id ? row : r);
    onUpdate({ ...budget, [kind]: list });
  };
  const deleteRow = (kind, id) => {
    onUpdate({ ...budget, [kind]: budget[kind].filter(r => r.id !== id) });

  const addRow = (kind) => {
    const id = kind[0] + '_' + Date.now();

            <span>収入 {formatYen(incTotal)}</span>
            <span>支出 {formatYen(expTotal)}</span>

          <div style={{ marginTop: 14, height: 4, borderRadius: 2, background: '#f1efe9', overflow: 'hidden', display: 'flex' }}>

<script type="text/babel">
// analytics — 月次比較・推移分析

function StatTile({ label, value, sub, color }) {

      }}>{value}</div>
      {sub && <div style={{ marginTop: 2, fontSize: 11, color: '#999' }}>{sub}</div>}
    </div>
  );
}

function TrendChart({ months, budgets }) {
  const W = 339, H = 180, PAD_L = 40, PAD_R = 14, PAD_T = 14, PAD_B = 26;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;

  const points = months.map(m => {
    const b = budgets[m];
    const inc = sumAmounts(b.incomes);
    const exp = sumAmounts(b.expenses);
    return { m, inc, exp, bal: inc - exp };
  });

  const maxVal = Math.max(1, ...points.flatMap(p => [p.inc, p.exp]));
  const minVal = Math.min(0, ...points.map(p => p.bal));
  const range = maxVal - minVal || 1;

  const x = (i) => PAD_L + (points.length === 1 ? innerW / 2 : (innerW * i) / (points.length - 1));
  const y = (v) => PAD_T + innerH - ((v - minVal) / range) * innerH;
  const zeroY = y(0);

  const pathFor = (key) => points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(p[key])}`).join(' ');

  const ticks = [];
  const niceMax = Math.ceil(maxVal / 200000) * 200000;
  for (let v = 0; v <= niceMax; v += 200000) ticks.push(v);

  return (
    <div style={{ background: '#fff', borderRadius: 14, padding: '14px 4px 6px 4px', border: '0.5px solid rgba(0,0,0,0.05)' }}>
      <div style={{ padding: '0 14px 8px', display: 'flex', alignItems: 'baseline', gap: 14, flexWrap: 'wrap' }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a' }}>収支推移</div>
        <div style={{ display: 'flex', gap: 12, fontSize: 10.5, color: '#666' }}>
          <Legend color="#2d6a4f" label="収入" />
          <Legend color="#c0392b" label="支出" />
          <Legend color="#1a1a1a" label="収支" dashed />
        </div>
      </div>
      <svg width={W} height={H} style={{ display: 'block', maxWidth: '100%' }}>
        {ticks.map(t => (
          <g key={t}>
            <line x1={PAD_L} x2={W - PAD_R} y1={y(t)} y2={y(t)} stroke="rgba(0,0,0,0.06)" />
            <text x={PAD_L - 6} y={y(t) + 3} textAnchor="end" fontSize="9" fill="#999"
              fontFamily="-apple-system, system-ui">
              {t === 0 ? '0' : `${t / 10000}万`}
            </text>
          </g>
        ))}
        {minVal < 0 && (
          <line x1={PAD_L} x2={W - PAD_R} y1={zeroY} y2={zeroY} stroke="rgba(0,0,0,0.18)" strokeDasharray="2 3" />
        )}
        <path d={pathFor('inc')} fill="none" stroke="#2d6a4f" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        <path d={pathFor('exp')} fill="none" stroke="#c0392b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        <path d={pathFor('bal')} fill="none" stroke="#1a1a1a" strokeWidth="1.5" strokeDasharray="3 3" strokeLinecap="round" />
        {points.map((p, i) => (
          <g key={p.m}>
            <circle cx={x(i)} cy={y(p.inc)} r="3" fill="#fff" stroke="#2d6a4f" strokeWidth="1.6" />
            <circle cx={x(i)} cy={y(p.exp)} r="3" fill="#fff" stroke="#c0392b" strokeWidth="1.6" />
            <circle cx={x(i)} cy={y(p.bal)} r="2.5" fill="#1a1a1a" />
            <text x={x(i)} y={H - 10} textAnchor="middle" fontSize="10" fill="#666"
              fontFamily="-apple-system, system-ui">{monthShort(p.m)}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function Legend({ color, label, dashed }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>

        width: 14, height: 2, background: dashed ? 'transparent' : color,

function MonthBars({ months, budgets }) {

                <BarRow label="支出" value={d.exp} max={maxVal} color="#c0392b" />

function BarRow({ label, value, max, color }) {
  const pct = (value / max) * 100;

      <div style={{ width: 28, fontSize: 10, color: '#999' }}>{label}</div>

function TopExpenses({ budget }) {
  const sorted = [...budget.expenses].sort((a, b) => b.amount - a.amount).slice(0, 5);
  const max = sorted[0]?.amount || 1;
  const total = sumAmounts(budget.expenses) || 1;
  return (

      <div style={{ fontSize: 13, fontWeight: 600, color: '#1a1a1a', marginBottom: 12 }}>支出トップ5</div>
      <div style={{ display: 'grid', gap: 10 }}>
        {sorted.map((r, i) => (
          <div key={r.id}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
              <div style={{ fontSize: 11, color: '#999', width: 14, fontVariantNumeric: 'tabular-nums' }}>{i + 1}</div>
              <div style={{ flex: 1, fontSize: 13, color: '#1a1a1a', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.name || '名称未設定'}</div>
              <div style={{ fontSize: 12, color: '#666', fontVariantNumeric: 'tabular-nums' }}>
                {((r.amount / total) * 100).toFixed(1)}%
              </div>
              <div style={{ fontSize: 13, color: '#1a1a1a', fontVariantNumeric: 'tabular-nums', fontWeight: 500, width: 80, textAlign: 'right' }}>
                {formatYen(r.amount)}

            <div style={{ marginLeft: 22, marginTop: 5, height: 4, background: '#f4f2ec', borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ width: `${(r.amount / max) * 100}%`, height: '100%', background: '#1a1a1a', borderRadius: 2 }}></div>
            </div>

  );
}

function AnalyticsScreen({ budgets, currentMonth }) {
  const months = sortedMonthKeys(budgets);
  const cur = budgets[currentMonth];
  const curIdx = months.indexOf(currentMonth);
  const prev = curIdx > 0 ? budgets[months[curIdx - 1]] : null;

  const curInc = sumAmounts(cur.incomes);
  const curExp = sumAmounts(cur.expenses);
  const curBal = curInc - curExp;
  const savingRate = curInc > 0 ? (curBal / curInc) * 100 : 0;

  const expChange = prev ? curExp - sumAmounts(prev.expenses) : 0;
  const incChange = prev ? curInc - sumAmounts(prev.incomes) : 0;

  return (
    <div style={{ padding: '16px 18px 100px', display: 'grid', gap: 14 }}>
      <div>
        <div style={{ fontSize: 11, color: '#888', letterSpacing: 1.4, fontWeight: 600 }}>分析対象</div>
        <div style={{ fontSize: 22, fontWeight: 400, color: '#1a1a1a', marginTop: 2, letterSpacing: -0.5 }}>
          {monthLabel(currentMonth)}
        </div>
      </div>

      <div style={{ display: 'flex', gap: 8 }}>
        <StatTile label="収支" value={formatYenSigned(curBal)} color={curBal < 0 ? '#c0392b' : '#2d6a4f'} sub={curBal < 0 ? '赤字' : '黒字'} />
        <StatTile label="貯蓄率" value={savingRate.toFixed(1) + '%'} sub={curInc > 0 ? `収入の${savingRate.toFixed(0)}%` : '—'} />
      </div>
      {prev && (
        <div style={{ display: 'flex', gap: 8 }}>
          <StatTile label="支出 前月比" value={formatYenSigned(expChange)} color={expChange > 0 ? '#c0392b' : '#2d6a4f'}
            sub={`${monthShort(months[curIdx - 1])} → ${monthShort(currentMonth)}`} />
          <StatTile label="収入 前月比" value={formatYenSigned(incChange)} color={incChange < 0 ? '#c0392b' : '#2d6a4f'}
            sub={`${monthShort(months[curIdx - 1])} → ${monthShort(currentMonth)}`} />
        </div>
      )}

      <TrendChart months={months} budgets={budgets} />
      <MonthBars months={months} budgets={budgets} />
      <TopExpenses budget={cur} />
    </div>
  );
}

Object.assign(window, { AnalyticsScreen });
</script>
<script type="text/babel">
// app — main shell: month tabs + screen switching + persistence

const ACCENT = '#c8941d';
const SHOW_DUE_DATE = true;
const COMPACT = false;

function MonthTabs({ months, current, onChange, onAdd, accent }) {
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    const el = scrollRef.current?.querySelector(`[data-month="${current}"]`);
    if (!el) return;
    if (el.scrollIntoViewIfNeeded) el.scrollIntoViewIfNeeded();
    else {
      const parent = scrollRef.current;
      const r1 = el.getBoundingClientRect();
      const r2 = parent.getBoundingClientRect();
      if (r1.left < r2.left || r1.right > r2.right) {
        parent.scrollLeft += (r1.left - r2.left) - (r2.width / 2 - r1.width / 2);
      }
    }
  }, [current]);

  return (
    <div ref={scrollRef} style={{
      display: 'flex', gap: 4, overflowX: 'auto', overflowY: 'hidden',
      padding: '4px 14px 10px', scrollbarWidth: 'none',
      WebkitOverflowScrolling: 'touch',
    }}>
      <style>{`div::-webkit-scrollbar{display:none}`}</style>
      {months.map(m => {
        const active = m === current;
        return (
          <button
            key={m}
            data-month={m}
            onClick={() => onChange(m)}
            style={{
              all: 'unset', cursor: 'pointer', flexShrink: 0,
              padding: '8px 14px', fontSize: 13.5,
              fontWeight: active ? 600 : 500,
              color: active ? '#fff' : '#666',
              background: active ? '#1a1a1a' : 'transparent',
              borderRadius: 999,
              transition: 'all 160ms ease',
              fontVariantNumeric: 'tabular-nums',
            }}>
            {monthShort(m)}
          </button>
        );
      })}
      <button
        onClick={onAdd}
        aria-label="月を追加"
        style={{
          all: 'unset', cursor: 'pointer', flexShrink: 0,
          padding: '8px 12px', fontSize: 13.5, fontWeight: 500,
          color: accent,
          borderRadius: 999,
          border: `1px dashed ${accent}55`,
        }}>
        + 月を追加
      </button>
    </div>
  );
}

function ViewSwitch({ value, onChange }) {
  const opts = [
    { id: 'budget', label: '家計簿' },
    { id: 'analytics', label: '分析' },
  ];
  return (
    <div style={{
      margin: '0 14px 8px',
      display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0,
      background: '#f1efe9', borderRadius: 10, padding: 3,
    }}>
      {opts.map(o => {
        const active = o.id === value;
        return (
          <button key={o.id} onClick={() => onChange(o.id)} style={{
            all: 'unset', cursor: 'pointer', textAlign: 'center',
            padding: '7px 0', fontSize: 13, fontWeight: 600,
            color: active ? '#1a1a1a' : '#888',
            background: active ? '#fff' : 'transparent',
            borderRadius: 8,
            boxShadow: active ? '0 1px 2px rgba(0,0,0,0.05)' : 'none',
            transition: 'all 160ms ease',
          }}>{o.label}</button>
        );
      })}
    </div>
  );
}

function pickInitialMonth(budgets) {
  const months = sortedMonthKeys(budgets);
  const cur = currentMonthKey();
  if (budgets[cur]) return cur;
  return months[months.length - 1] || cur;
}

function App() {
  const [budgets, setBudgets] = React.useState(INITIAL_BUDGETS);
  const [hydrated, setHydrated] = React.useState(false);
  const [currentMonth, setCurrentMonth] = React.useState(() => pickInitialMonth(INITIAL_BUDGETS));
  const [view, setView] = React.useState('budget');
  const [voiceOpen, setVoiceOpen] = React.useState(false);
  const [saveStatus, setSaveStatus] = React.useState('idle'); // idle | saving | saved | error
  const saveTimerRef = React.useRef(null);

  // 初回ロード
  React.useEffect(() => {
    let cancelled = false;
    MyBudgetStorage.load().then((data) => {
      if (cancelled) return;
      if (data && typeof data === 'object' && Object.keys(data).length > 0) {
        setBudgets(data);
        setCurrentMonth(pickInitialMonth(data));
      }
      setHydrated(true);
    });
    return () => { cancelled = true; };
  }, []);

  // 変更を debounce して保存
  React.useEffect(() => {
    if (!hydrated) return;
    setSaveStatus('saving');
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      MyBudgetStorage.save(budgets).then((ok) => {
        setSaveStatus(ok ? 'saved' : 'error');
        if (ok) setTimeout(() => setSaveStatus('idle'), 1400);
      });
    }, 600);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [budgets, hydrated]);

  const months = sortedMonthKeys(budgets);

  const handleAddMonth = () => {
    const last = months[months.length - 1];
    const next = nextMonthKey(last);
    if (budgets[next]) { setCurrentMonth(next); return; }
    const template = budgets[last];
    setBudgets({
      ...budgets,
      [next]: {
        expenses: template.expenses.map(r => ({ ...r })),
        incomes: template.incomes.map(r => ({ ...r })),
      },
    });
    setCurrentMonth(next);
  };

  const updateBudget = (newBudget) => {
    setBudgets({ ...budgets, [currentMonth]: newBudget });
  };

  const handleVoiceAdd = (kind, item, matchedItemId) => {
    const cur = budgets[currentMonth];
    if (matchedItemId) {
      const list = cur[kind].map(r => r.id === matchedItemId
        ? { ...r, amount: item.amount, due: item.due || r.due }
        : r);
      updateBudget({ ...cur, [kind]: list });
      return;
    }
    const id = (kind === 'incomes' ? 'i_' : 'e_') + Date.now();
    const newRow = { id, name: item.name, amount: item.amount, due: item.due };
    updateBudget({ ...cur, [kind]: [...cur[kind], newRow] });
  };

  const handleReset = () => {
    if (!confirm('編集内容を破棄してサンプルデータに戻しますか？')) return;
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run.withSuccessHandler(() => {}).withFailureHandler(() => {}).resetBudgets();
    }
    try { localStorage.removeItem('mybudget_v1'); } catch (e) {}
    setBudgets(INITIAL_BUDGETS);
    setCurrentMonth(pickInitialMonth(INITIAL_BUDGETS));
  };

  return (
    <div style={{
      height: '100%',
      display: 'flex', flexDirection: 'column',
      background: '#fafaf7',
      position: 'relative',
      overflow: 'hidden',
    }}>
      <div style={{
        background: '#fafaf7',
        borderBottom: '0.5px solid rgba(0,0,0,0.06)',
        paddingTop: 'calc(env(safe-area-inset-top) + 12px)',
      }}>
        <div style={{ padding: '4px 18px 2px', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontSize: 10.5, color: '#888', letterSpacing: 1.6, fontWeight: 600 }}>🍀 MYBUDGET</div>
            <div style={{ fontSize: 21, fontWeight: 400, color: '#1a1a1a', marginTop: 1, letterSpacing: -0.4 }}>
              {monthLabel(currentMonth)}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 10.5, color: '#aaa', fontVariantNumeric: 'tabular-nums' }}>
              {months.length}ヶ月のデータ
            </div>
            <div style={{ fontSize: 10, color: '#bbb', marginTop: 2, height: 12 }}>
              {saveStatus === 'saving' && '保存中…'}
              {saveStatus === 'saved' && '✓ 保存済み'}
              {saveStatus === 'error' && '⚠ 保存失敗'}
            </div>
          </div>
        </div>
        <ViewSwitch value={view} onChange={setView} />
        <MonthTabs months={months} current={currentMonth} onChange={setCurrentMonth} onAdd={handleAddMonth} accent={ACCENT} />
      </div>

      <div style={{ flex: 1, overflow: 'auto', WebkitOverflowScrolling: 'touch', position: 'relative' }}>
        {budgets[currentMonth] && (view === 'budget' ? (
          <BudgetScreen
            budget={budgets[currentMonth]}
            onUpdate={updateBudget}
            accent={ACCENT}
            showDueDate={SHOW_DUE_DATE}
            compact={COMPACT}
          />
        ) : (
          <AnalyticsScreen budgets={budgets} currentMonth={currentMonth} />
        ))}
        {view === 'budget' && (
          <div style={{ padding: '0 18px 24px', textAlign: 'center' }}>
            <button onClick={handleReset} style={{
              all: 'unset', cursor: 'pointer', fontSize: 11, color: '#bbb',
              padding: '6px 12px', borderRadius: 8,
            }}>サンプルデータに戻す</button>
          </div>
        )}
      </div>

      {view === 'budget' && (
        <button onClick={() => setVoiceOpen(true)} aria-label="音声で追加" style={{
          all: 'unset', cursor: 'pointer',
          position: 'absolute',
          right: 18,
          bottom: 'calc(env(safe-area-inset-bottom) + 24px)',
          zIndex: 50,
          width: 56, height: 56, borderRadius: 999,
          background: '#1a1a1a',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 8px 24px rgba(0,0,0,0.22), 0 2px 4px rgba(0,0,0,0.12)',
        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="3" width="6" height="12" rx="3" fill="#fff"/>
            <path d="M5 11a7 7 0 0014 0M12 18v3" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" fill="none"/>
          </svg>
        </button>
      )}

      <VoiceInputModal
        open={voiceOpen}
        onClose={() => setVoiceOpen(false)}
        onAdd={handleVoiceAdd}
        accent={ACCENT}
        budget={budgets[currentMonth]}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
